name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: 📈 Lenguajes más usados
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AbelRomann
          template: classic
          base: languages
          config_timezone: America/Santo_Domingo
          filename: metrics.languages.svg
