name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # cada hora
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics embed
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          user: AbelRomann
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/Santo_Domingo


      - name: 🦑 General
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PAT_1 }}
          user: AbelRomann
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/Santo_Domingo
