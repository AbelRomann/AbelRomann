name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # cada hora
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: 🦑 General
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }} # opcional, solo si quieres commits automáticos
          user: AbelRomann
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/Santo_Domingo
          filename: metrics.svg
